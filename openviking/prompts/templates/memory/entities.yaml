memory_type: entities
description: |
  Wikipedia article - manages page using Zettelkasten method.
  Each page represents an article with relative path links to events.
  Entity should be rich and distributed - avoid putting all info in one entity.
directory: "viking://user/{{ user_space }}/memories/entities"
filename_template: "{{ category }}/{{ name }}.md"
enabled: true

overview_template: |-
  # Entities Overview
  {% if items %}**Category:** {{ items[0].file_content.category }}{% endif %}
  {% for item in items %}
  - [{{ item.file_content.name }}](./{{ item.file_name }})
  {% endfor %}

fields:
  - name: category
    type: string
    description: |
      - Category name in Chinese or English. If English, use lowercase with underscores, max 3 words.
    merge_op: immutable

  - name: name
    type: string
    description: |
      - Entity name in Chinese or English. If English, use lowercase with underscores, max 3 words.
    merge_op: immutable

  - name: content
    type: string
    description: |
      - Detailed Zettelkasten card content in markdown format
      - **IMPORTANT**: Each bullet point should include specific details, NOT vague summaries.
        Record WHAT was created/done (specific subjects, items, titles), not just that something was done.
        Examples:
        - "Made a black and white bowl, a plate, and a cup with dog face" NOT just "Made pottery"
        - "Plays clarinet and violin" NOT just "Plays an instrument"
        - "Important symbols: Rainbow flag, transgender symbol" NOT just "Important symbols"
      - **IMPORTANT**: Include event cross-references using relative paths so that
        readers can navigate from an entity to its related events for more detail.
      - **For person entities**: This is a DETAILED entity page, NOT a duplicate of the profile.
        Focus on this person's relationships, interactions with other people, and cross-references
        to their activities/entities. The profile stores flat attributes; the person entity stores
        relational and contextual information with cross-references.
      Relative path format: events://{event_name} or ../events/{year}/{month}/{day}/{event_name}.md
      - Example:
      # Pottery
      - Melanie takes pottery classes (as of 2023-07-03) [→ class](../events/2023/07/03/melanie_pottery_class.md)
        - Made a black and white bowl, a plate, and a cup with dog face
      - Got injured Sep 2023, taking break [→ injury](../events/2023/10/13/melanie_pottery_injury.md)
      - Caroline interested in trying pottery (as of 2023-09-13)
      - Example:
      # Book club events Caroline participated in:
      - [Monthly book discussion](../events/2023/03/05/Monthly book discussion.md)
      - [Author meetup](events://Author meetup)
      - [Summer reading challenge](../events/2024/03/10/Summer reading challenge.md)

    merge_op: patch
